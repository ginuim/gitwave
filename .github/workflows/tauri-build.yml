# 在 push / PR 上验证 Tauri 构建，并把 Windows 安装包作为 workflow artifact（在 Actions 页下载）。
name: Tauri build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: tauri-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
      actions: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: windows

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          projectPath: .

      - name: Upload bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundle-windows
          path: |
            src-tauri/target/**/bundle/**/*.exe
          if-no-files-found: warn
